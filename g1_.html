<body>

<h1>Knight Adventure</h1>

<div class="slider">

<img id="slide" src="k1.jpg">

</div>


<script>

let slike=[
"k1.jpg",
"k2.jpg",
"k3.jpg",
"k4.jpg",

let i=0;

setInterval(function(){

i++;

if(i>=slike.length){
i=0;
}

document.getElementById("slide").src=slike[i];

},3000);

</script>
